name: Shopify Health Check

on:
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC (09:00 Sofia time)
  workflow_dispatch:

# Only one health-check at a time — never cancel a running check mid-flight
concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  health-check:
    name: Playwright health check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      # Multi-site: set SITES_JSON secret to a JSON array of sites.
      # Single-site fallback: set STORE_URL / PRODUCT_HANDLE / PRODUCT_HANDLE_2 secrets.
      - name: Write sites config
        env:
          SITES_JSON:       ${{ secrets.SITES_JSON }}
          STORE_URL:        ${{ secrets.STORE_URL        || 'https://zerno.co' }}
          PRODUCT_HANDLE:   ${{ secrets.PRODUCT_HANDLE   || 'zerno-z1' }}
          PRODUCT_HANDLE_2: ${{ secrets.PRODUCT_HANDLE_2 || 'zerno-z2' }}
          SEARCH_TERM:      ${{ secrets.SEARCH_TERM      || 'zerno' }}
        run: |
          if [ -n "$SITES_JSON" ]; then
            echo "$SITES_JSON" > sites.json
            echo "Using SITES_JSON secret ($(node -e "console.log(require('./sites.json').length)") site(s))"
          else
            node -e "
              const url  = process.env.STORE_URL;
              const slug = url.replace(/https?:\/\//, '').split('/')[0].replace(/[^a-z0-9]/gi, '-').toLowerCase();
              const site = {
                name:          slug,
                slug,
                url,
                productHandle:  process.env.PRODUCT_HANDLE,
                productHandle2: process.env.PRODUCT_HANDLE_2,
                searchTerm:     process.env.SEARCH_TERM || slug,
              };
              require('fs').writeFileSync('sites.json', JSON.stringify([site], null, 2));
              console.log('Created sites.json for ' + url);
            "
          fi

      - name: Run health check
        run: pnpm test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-${{ github.run_id }}
          path: reports/
          retention-days: 30
