<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zerno.co — Test History</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      margin: 0;
      padding: 24px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 32px; }

    /* Summary cards */
    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 20px 28px;
      min-width: 130px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      text-align: center;
    }
    .card .value { font-size: 2.4rem; font-weight: 700; line-height: 1; }
    .card .label { font-size: 0.78rem; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .card.green .value { color: #22c55e; }
    .card.red .value { color: #ef4444; }
    .card.blue .value { color: #3b82f6; }
    .card.gray .value { color: #6b7280; }

    /* Runs table */
    .table-wrap {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
      margin-bottom: 32px;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #f8fafc;
      text-align: left;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #555;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    td {
      padding: 13px 16px;
      border-bottom: 1px solid #f1f3f5;
      font-size: 0.9rem;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge.pass { background: #dcfce7; color: #15803d; }
    .badge.fail { background: #fee2e2; color: #b91c1c; }

    .num-pass { color: #15803d; font-weight: 600; }
    .num-fail { color: #b91c1c; font-weight: 600; }
    .num-skip { color: #92400e; }

    a { color: #3b82f6; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Suite breakdown (collapsible) */
    details { margin-top: 6px; }
    summary {
      font-size: 0.8rem;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
    }
    .suite-list { margin-top: 4px; padding-left: 12px; }
    .suite-row { font-size: 0.78rem; display: flex; gap: 6px; align-items: baseline; }
    .s-dot { font-size: 0.7rem; }
    .s-dot.ok { color: #22c55e; }
    .s-dot.ko { color: #ef4444; }
    .s-dot.sk { color: #f59e0b; }
    .s-name { color: #374151; }

    footer { color: #9ca3af; font-size: 0.78rem; margin-top: 16px; }
  </style>
</head>
<body>

  <h1>🛒 Zerno.co — Automated Test History</h1>
  <p class="subtitle">Weekly health-check report for <strong>zerno.co</strong> · Generated: 24.03.2026 г., 22:36:21 ч.</p>

  <div class="cards">
    <div class="card blue">
      <div class="value">0</div>
      <div class="label">Total Runs</div>
    </div>
    <div class="card green">
      <div class="value">0</div>
      <div class="label">Passed</div>
    </div>
    <div class="card red">
      <div class="value">0</div>
      <div class="label">With Failures</div>
    </div>
    
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date &amp; Time</th>
          <th>Status</th>
          <th>Tests</th>
          <th>Duration</th>
          <th>Suites</th>
          <th>Report</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:32px">No runs yet. Run <code>npm test</code> to get started.</td></tr>
        
      </tbody>
    </table>
  </div>

  <footer>Generated by <code>scripts/update-history.js</code> · <a href="https://playwright.dev" target="_blank">Playwright</a></footer>

</body>
</html>
